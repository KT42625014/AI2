<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>英文發音播放清單 (Forvo)</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background-color: #f0f8ff;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #004080;
      color: white;
      padding: 25px;
      text-align: center;
    }
    section {
      padding: 30px;
      max-width: 900px;
      margin: auto;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    h2 {
      color: #004080;
      border-bottom: 2px solid #66ccff;
      padding-bottom: 5px;
    }
    .word-block {
      margin-bottom: 20px;
    }
    a.play-button {
      display: inline-block;
      background-color: #66ccff;
      color: #004080;
      padding: 8px 12px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }
    a.play-button:hover {
      background-color: #3399ff;
      color: white;
    }
    footer {
      background-color: #004080;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>英文發音播放清單 (Forvo)</h1>
  </header>

  <section>
    <h2>常見單字</h2>

    <div class="word-block">
      <strong>Pronunciation</strong><br>
      <a class="play-button" href="https://forvo.com/word/pronunciation/#en" target="_blank">按鈕</a>
    </div>

    <div class="word-block">
      <strong>Communication</strong><br>
      <a class="play-button" href="https://forvo.com/word/communication/#en" target="_blank">按鈕</a>
    </div>

    <div class="word-block">
      <strong>Education</strong><br>
      <a class="play-button" href="https://forvo.com/word/education/#en" target="_blank">按鈕</a>
    </div>

    <div class="word-block">
      <strong>Technology</strong><br>
      <a class="play-button" href="https://forvo.com/word/technology/#en" target="_blank">按鈕</a>
    </div>
  </section>

  <footer>
    <p>© 2026 英語學習資源</p>
  </footer>
</body>
</html>

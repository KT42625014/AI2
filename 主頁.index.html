<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>如何改善英文發音</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", sans-serif;
      background-color: #f0f8ff;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #004080;
      color: white;
      padding: 25px;
      text-align: center;
    }
    section {
      padding: 30px;
      max-width: 900px;
      margin: auto;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    h2 {
      color: #004080;
      border-bottom: 2px solid #66ccff;
      padding-bottom: 5px;
    }
    p {
      line-height: 1.8;
      color: #333;
    }
    ul {
      list-style-type: square;
      color: #004080;
    }
    footer {
      background-color: #004080;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
    button {
      background-color: #66ccff;
      border: none;
      padding: 10px 15px;
      margin-top: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #3399ff;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>如何改善英文發音</h1>
  </header>

  <section>
    <h2>常見挑戰</h2>
    <p>許多學習者在英文發音上遇到困難，例如母語影響、音標不熟悉或缺乏練習環境。</p>

    <h2>改善方法</h2>
    <ul>
      <li>練習 [音標]，掌握正確的發音基礎</li>
      <li>透過 [聽力訓練]，模仿母語者的語音</li>
      <li>使用 [錄音工具]，檢查自己的發音是否正確</li>
      <li>參加 [口語課程]，獲得專業指導</li>
    </ul>

    <h2>發音示範</h2>
    <p>點擊下方按鈕即可聽到 "Pronunciation" 的正確發音：</p>
    <audio id="audioPronunciation" src="pronunciation.mp3"></audio>
    <button onclick="document.getElementById('audioPronunciation').play()">播放發音</button>
    
    <p>點擊下方按鈕即可到 "多單字播放清單"：</p>
    <audio id="audioPronunciation" src="pronunciation.mp3"></audio>
    <button onclick="C:\Users\Student\Desktop\網頁\3.html">連結</button>

  </section>

  <footer>
    <p>© 2026 英語學習資源</p>
  </footer>
</body>
</html>
